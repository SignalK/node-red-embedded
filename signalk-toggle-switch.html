<script type="text/javascript">
    RED.nodes.registerType('signalk-toggle-switch',{
        category: 'Signal K',
        color: '#ffcc01',
        defaults: {
          name: {value:""},
          path: {value:"", required: true},
          displayName: {value:""},
        },
        inputs:1,
        outputs:1,
        outputLabels: [ 'state' ],
        inputLabels: [ 'state' ],
        icon: "bridge.png",
        label: function() {
            return this.name||"signalk-toggle-switch";
        },
        paletteLabel: 'toggle switch'
    });
</script>

<script type="text/x-red" data-template-name="signalk-toggle-switch">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
        <label for="node-input-path"><i class="icon-tag"></i> Path</label>
        <input type="text" id="node-input-path" placeholder="Path">
  </div>
  <div class="form-row">
        <label for="node-input-displayName"><i class="icon-tag"></i> Display Name</label>
        <input type="text" id="node-input-displayName" placeholder="Display Name">
  </div>
</script>

<script type="text/x-red" data-help-name="signalk-toggle-switch">
    <p>Toggle switch for the given path in the Signal K server. ".state" will be appended automatically if not present.</p>
    <p>The state of the switch is stored in the global context in a store called skpersist which defaults to localstorage.</p>
</script>
